services:
  magic-push:
    build: .
    container_name: magic-push
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3001}
      # 必需的环境变量（请在 .env 文件中配置）
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL}
      - PUSH_TOKEN=${PUSH_TOKEN}
    restart: unless-stopped
    volumes:
      # 挂载数据目录（用于持久化数据库）
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:${PORT:-3001}/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
